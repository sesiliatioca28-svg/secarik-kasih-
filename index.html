<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Ibuk Tyas 🤍</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffe6eb, #ffffff);
  text-align: center;
  overflow-x: hidden;
}

/* OPENING */
#opening {
  padding: 60px;
}

#openingText {
  max-width: 650px;
  margin: auto;
  font-size: 18px;
  line-height: 1.8;
  white-space: pre-line;
}

.glow {
  font-size: 28px;
  color: #ff6f91;
  text-shadow: 0 0 10px #ff6f91;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #ff6f91;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

/* ENVELOPE */
.envelope {
  width: 220px;
  height: 130px;
  background: #ff6f91;
  margin: 60px auto;
  position: relative;
  display: none;
  cursor: pointer;
}

.envelope:before {
  content: '';
  position: absolute;
  top: -65px;
  border-left: 110px solid transparent;
  border-right: 110px solid transparent;
  border-bottom: 65px solid #ff6f91;
}

/* CONTENT */
.container {
  display: none;
  padding: 20px;
}

.card {
  background: white;
  padding: 25px;
  margin: 20px auto;
  max-width: 700px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  line-height: 1.8;
  white-space: pre-line;
  text-align: left;
}

/* HEART */
.heart {
  position: fixed;
  width: 10px;
  height: 10px;
  background: red;
  transform: rotate(45deg);
  animation: fall 5s linear infinite;
}

@keyframes fall {
  0% { top: -10px; }
  100% { top: 100vh; }
}
</style>
</head>

<body>

<!-- OPENING -->
<div id="opening">
  <h2>🤍 Before You Open This</h2>
  <p id="openingText"></p>
  <button class="btn" onclick="nextStep()">Next 💌</button>
</div>

<!-- TITLE -->
<h1 class="glow" id="title" style="display:none;">For Ibuk Tyas 🤍</h1>

<button class="btn" id="startBtn" style="display:none;" onclick="showEnvelope()">
Klik ini ya ibuk 💌
</button>

<!-- ENVELOPE -->
<div class="envelope" id="env" onclick="openLetter()"></div>

<!-- CONTENT -->
<div class="container" id="content">

  <h2 class="glow">Happy Birthday Ibuk Tyas 🤍</h2>

  <div class="card" id="text"></div>

  <button class="btn" onclick="toggleMusic()">🎶 Play / Pause Music</button>

  <audio id="music" loop>
    <source src="aboutyou.mp3" type="audio/mpeg">
  </audio>

</div>

<script>

/* =========================
   OPENING TEXT (FULL VIBE)
========================= */
const openingMessage = `Before you open this… 🤍

Aku cuma mau ibuk tau bahwa dari semua hal yang pernah aku lewatin,  
ketemu ibuk adalah salah satu hal terbaik yang pernah terjadi di hidup aku.

Mungkin ibuk nggak selalu sadar,  
tapi cara ibuk hadir, cara ibuk peduli,  
cara ibuk memperhatikan hal-hal kecil,  
itu semua punya arti yang sangat besar buat aku.

Ibuk bukan cuma mentor,  
tapi juga seseorang yang tanpa sadar jadi tempat paling tenang buat aku.

So… this little thing I made is not much,  
but it comes from a very sincere place.

Klik pelan-pelan ya ibuk 💌`;

let o = 0;
function typeOpening(){
  if(o < openingMessage.length){
    document.getElementById("openingText").innerHTML += openingMessage.charAt(o);
    o++;
    setTimeout(typeOpening, 20);
  }
}
typeOpening();

function nextStep(){
  document.getElementById("opening").style.display = "none";
  document.getElementById("title").style.display = "block";
  document.getElementById("startBtn").style.display = "inline-block";
}

/* =========================
   ENVELOPE
========================= */
function showEnvelope(){
  document.getElementById("startBtn").style.display = "none";
  document.getElementById("env").style.display = "block";
}

/* =========================
   MAIN MESSAGE (FULL TEXT KAMU)
========================= */
const message = `Happy birthday to the most amazing mentor I could ever have 🤍

IBUKKK TYASSS, aku bener-bener bersyukur bisa kenal dan dibimbing sama ibuk. Dari semua hal yang ibuk lakuin, cara ibuk memperhatikan hal-hal kecil, cara ibuk selalu ada, sampai cara ibuk bikin suasana jadi hangatt… itu semua bikin aku ngerasa nyaman banget jadi anak mentornya ibuk. Ibuk tuh bukan cuma keren, tapi juga punya hati yang besar yang selalu nyebarin kebaikan.

Kadang aku mikir… “Do you think I have forgotten about you?”
And the answer is no, I never will.
Because every little thing you’ve done, every word, every moment it stays. It means something. It shapes me.

Ibukk itu kaya rumah, tempat yang selalu bikin tenang dan tanpa ibuk sadari, ibuk udah jadi bagian penting dalam perjalanan aku. Makasihh yaaaa ibuk, udah jadi sosok yang penyayang, sabar, dan selalu ngerti.

I hope today reminds you of how loved you are.
I hope you realize how many hearts you’ve touched, including mine.
And I hope life gives back all the kindness you’ve been giving to everyone around you.

Selamat ulang tahun, Ibuk Tyas 🤍
Semoga semua hal baik selalu datang ke ibuk, seperti ibuk yang selalu jadi hal baik untuk orang lain. Jangan pernah berubah ya, karena dunia butuh lebih banyak orang seperti ibuk.

With love,
OCHA anak mentor yang selalu bangga punya ibuk 🤍🥹`;

let i = 0;
function typeWriter(){
  if(i < message.length){
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 15);
  }
}

/* =========================
   OPEN LETTER
========================= */
function openLetter(){
  document.getElementById("env").style.display = "none";
  document.getElementById("content").style.display = "block";

  document.getElementById("music").play();

  typeWriter();
  hearts();
}

/* =========================
   MUSIC CONTROL
========================= */
let isPlaying = false;
function toggleMusic(){
  const music = document.getElementById("music");

  if(!isPlaying){
    music.play();
    isPlaying = true;
  } else {
    music.pause();
    isPlaying = false;
  }
}

/* =========================
   HEART ANIMATION
========================= */
function hearts(){
  setInterval(()=>{
    let h = document.createElement("div");
    h.className = "heart";
    h.style.left = Math.random()*100 + "vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },300);
}

</script>

</body>
</html>
